<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plan de Espalda — Seguimiento</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --accent: #e8ff47;
    --accent2: #47ffb8;
    --text: #f0f0f0;
    --muted: #666;
    --border: #2e2e2e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 24px 16px 60px;
  }

  header {
    text-align: center;
    margin-bottom: 32px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }

  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.5rem, 8vw, 4rem);
    letter-spacing: 0.05em;
    color: var(--accent);
    line-height: 1;
  }

  header p {
    color: var(--muted);
    font-size: 0.85rem;
    margin-top: 6px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .week-selector {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 28px;
  }

  .week-selector button {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    width: 36px; height: 36px;
    border-radius: 50%;
    font-size: 1.1rem;
    cursor: pointer;
    transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
  }

  .week-selector button:hover { background: var(--accent); color: #000; border-color: var(--accent); }

  #week-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 0.1em;
    color: var(--accent2);
    min-width: 120px;
    text-align: center;
  }

  .days-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 28px;
  }

  .day-btn {
    background: var(--surface);
    border: 2px solid var(--border);
    color: var(--muted);
    padding: 14px 8px;
    border-radius: 12px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }

  .day-btn:hover { border-color: var(--accent); color: var(--text); }
  .day-btn.active { border-color: var(--accent); background: rgba(232,255,71,0.08); color: var(--accent); }
  .day-btn.completed { border-color: var(--accent2); background: rgba(71,255,184,0.08); color: var(--accent2); }
  .day-btn .check { font-size: 0.8rem; display: block; }

  .session-panel {
    background: var(--surface);
    border-radius: 16px;
    border: 1px solid var(--border);
    overflow: hidden;
  }

  .session-header {
    background: var(--surface2);
    padding: 16px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
  }

  .session-header h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    letter-spacing: 0.06em;
    color: var(--accent);
  }

  .finish-btn {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 8px 18px;
    border-radius: 20px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 0.8rem;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: opacity 0.15s;
  }

  .finish-btn:hover { opacity: 0.85; }

  .exercise-list { padding: 12px; }

  .exercise-card {
    background: var(--surface2);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 10px;
    border: 1px solid var(--border);
  }

  .exercise-top-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .exercise-name {
    font-weight: 600;
    font-size: 0.95rem;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .muscle-tag {
    font-size: 0.68rem;
    background: rgba(232,255,71,0.12);
    color: var(--accent);
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 500;
    letter-spacing: 0.04em;
  }

  .info-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    width: 28px; height: 28px;
    border-radius: 50%;
    font-size: 0.8rem;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .info-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  .sets-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .set-item {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
    min-width: 70px;
    flex: 1;
  }

  .set-item:hover { border-color: var(--accent); }
  .set-item.done { border-color: var(--accent2); background: rgba(71,255,184,0.1); }

  .set-label {
    font-size: 0.65rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 4px;
  }

  .set-reps {
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
  }

  .set-done-icon { font-size: 1rem; display: none; }
  .set-item.done .set-done-icon { display: block; }
  .set-item.done .set-reps { display: none; }

  /* GUIDE MODAL */
  .guide-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    backdrop-filter: blur(8px);
    z-index: 1100;
    display: flex;
    flex-direction: column;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
    overflow-y: auto;
  }
  .guide-overlay.active { opacity: 1; pointer-events: all; }

  .guide-inner {
    padding: 24px 20px 48px;
    max-width: 500px;
    margin: 0 auto;
    width: 100%;
  }

  .guide-close {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 16px;
  }

  .guide-close button {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    width: 36px; height: 36px;
    border-radius: 50%;
    font-size: 1.1rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .guide-close button:hover { border-color: #ff4747; color: #ff4747; }

  .guide-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    letter-spacing: 0.05em;
    color: var(--accent);
    margin-bottom: 4px;
  }

  .guide-muscle {
    font-size: 0.75rem;
    color: var(--accent2);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .guide-img {
    width: 100%;
    border-radius: 12px;
    margin-bottom: 16px;
    object-fit: cover;
    max-height: 220px;
    border: 1px solid var(--border);
    background: var(--surface2);
  }

  .guide-anchor-box {
    background: rgba(71,255,184,0.07);
    border: 1px solid rgba(71,255,184,0.2);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 16px;
  }

  .guide-anchor-label {
    font-size: 0.7rem;
    color: var(--accent2);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
    font-weight: 600;
  }

  .guide-anchor-img {
    width: 100%;
    border-radius: 8px;
    max-height: 140px;
    object-fit: cover;
    margin-bottom: 8px;
    border: 1px solid var(--border);
  }

  .guide-anchor-text {
    font-size: 0.8rem;
    color: var(--muted);
    line-height: 1.5;
  }

  .guide-steps {
    list-style: none;
    margin-bottom: 16px;
  }

  .guide-steps li {
    display: flex;
    gap: 12px;
    margin-bottom: 10px;
    font-size: 0.85rem;
    line-height: 1.5;
    color: var(--text);
  }

  .step-num {
    background: var(--accent);
    color: #000;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.85rem;
    width: 22px; height: 22px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .guide-tip {
    background: rgba(232,255,71,0.07);
    border-left: 3px solid var(--accent);
    padding: 10px 14px;
    border-radius: 0 8px 8px 0;
    font-size: 0.82rem;
    color: var(--muted);
    line-height: 1.5;
  }

  .guide-tip strong { color: var(--accent); }

  /* STRETCHING POPUP */
  .stretch-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    backdrop-filter: blur(10px);
    z-index: 1200;
    display: flex;
    flex-direction: column;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    overflow-y: auto;
  }
  .stretch-overlay.active { opacity: 1; pointer-events: all; }

  .stretch-inner {
    padding: 24px 20px 60px;
    max-width: 500px;
    margin: 0 auto;
    width: 100%;
  }

  .stretch-header {
    text-align: center;
    margin-bottom: 24px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .stretch-header h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 0.06em;
    color: var(--accent2);
    margin-bottom: 4px;
  }

  .stretch-header p {
    font-size: 0.8rem;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .stretch-progress-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    font-size: 0.78rem;
    color: var(--muted);
  }

  .stretch-progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 20px;
  }

  .stretch-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 10px;
    transition: width 0.4s ease;
  }

  .stretch-card {
    background: var(--surface);
    border-radius: 14px;
    border: 1px solid var(--border);
    overflow: hidden;
    margin-bottom: 12px;
    transition: border-color 0.2s;
  }

  .stretch-card.checked { border-color: var(--accent2); }

  .stretch-card-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    cursor: pointer;
  }

  .stretch-card-left { display: flex; align-items: center; gap: 12px; }

  .stretch-check {
    width: 26px; height: 26px;
    border-radius: 50%;
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.85rem;
    flex-shrink: 0;
    transition: all 0.2s;
    color: transparent;
  }

  .stretch-card.checked .stretch-check {
    background: var(--accent2);
    border-color: var(--accent2);
    color: #000;
  }

  .stretch-card-info { flex: 1; }

  .stretch-name {
    font-weight: 600;
    font-size: 0.92rem;
    margin-bottom: 2px;
  }

  .stretch-card.checked .stretch-name { color: var(--accent2); }

  .stretch-meta {
    font-size: 0.72rem;
    color: var(--muted);
    display: flex;
    gap: 10px;
  }

  .stretch-time {
    background: rgba(71,255,184,0.1);
    color: var(--accent2);
    padding: 1px 7px;
    border-radius: 10px;
    font-size: 0.68rem;
    font-weight: 600;
  }

  .stretch-info-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    width: 26px; height: 26px;
    border-radius: 50%;
    font-size: 0.75rem;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
    margin-left: 8px;
  }
  .stretch-info-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  .stretch-detail {
    display: none;
    padding: 0 16px 14px;
    border-top: 1px solid var(--border);
  }

  .stretch-detail.open { display: block; }

  .stretch-detail img {
    width: 100%;
    border-radius: 10px;
    max-height: 180px;
    object-fit: cover;
    margin: 12px 0 10px;
    border: 1px solid var(--border);
  }

  .stretch-detail-steps {
    list-style: none;
    margin-bottom: 10px;
  }

  .stretch-detail-steps li {
    display: flex;
    gap: 10px;
    margin-bottom: 8px;
    font-size: 0.82rem;
    line-height: 1.5;
    color: var(--text);
  }

  .stretch-step-num {
    background: var(--accent2);
    color: #000;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.8rem;
    width: 20px; height: 20px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .stretch-tip {
    background: rgba(71,255,184,0.07);
    border-left: 3px solid var(--accent2);
    padding: 8px 12px;
    border-radius: 0 8px 8px 0;
    font-size: 0.78rem;
    color: var(--muted);
    line-height: 1.5;
  }

  .stretch-tip strong { color: var(--accent2); }

  .stretch-finish-btn {
    display: block;
    width: 100%;
    margin-top: 24px;
    background: var(--accent2);
    color: #000;
    border: none;
    padding: 16px;
    border-radius: 12px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .stretch-finish-btn:hover { opacity: 0.85; }
  .stretch-finish-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .progress-bar-wrap {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.75rem;
    color: var(--muted);
    margin-bottom: 8px;
    letter-spacing: 0.04em;
  }

  .progress-bar {
    height: 6px;
    background: var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 10px;
    transition: width 0.4s ease;
    width: 0%;
  }

  .stats-section {
    margin-top: 28px;
    padding: 20px;
    background: var(--surface);
    border-radius: 16px;
    border: 1px solid var(--border);
  }

  .stats-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    letter-spacing: 0.08em;
    color: var(--accent2);
    margin-bottom: 16px;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }

  .stat-box {
    background: var(--surface2);
    border-radius: 10px;
    padding: 14px 10px;
    text-align: center;
    border: 1px solid var(--border);
  }

  .stat-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    color: var(--accent);
    line-height: 1;
  }

  .stat-desc {
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-top: 4px;
  }

  .reset-btn {
    display: block;
    width: 100%;
    margin-top: 28px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 12px;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: all 0.15s;
  }

  .reset-btn:hover { border-color: #ff4747; color: #ff4747; }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--accent);
    color: #000;
    padding: 12px 24px;
    border-radius: 50px;
    font-weight: 600;
    font-size: 0.85rem;
    transition: transform 0.3s ease;
    z-index: 999;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* TIMER OVERLAY */
  .timer-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(6px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .timer-overlay.active {
    opacity: 1;
    pointer-events: all;
  }

  .timer-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    margin-bottom: 16px;
    text-transform: uppercase;
  }

  .timer-ring {
    position: relative;
    width: 180px;
    height: 180px;
    margin-bottom: 24px;
  }

  .timer-ring svg {
    transform: rotate(-90deg);
    width: 180px;
    height: 180px;
  }

  .timer-ring svg circle {
    fill: none;
    stroke-width: 6;
  }

  .timer-ring .bg-circle { stroke: var(--border); }
  .timer-ring .fg-circle {
    stroke: var(--accent2);
    stroke-linecap: round;
    transition: stroke-dashoffset 1s linear;
  }

  .timer-number {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 4rem;
    color: var(--text);
    line-height: 1;
  }

  .timer-number.urgent { color: #ff4747; }

  .timer-exercise-name {
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 28px;
    text-align: center;
    padding: 0 20px;
  }

  .timer-actions {
    display: flex;
    gap: 12px;
  }

  .timer-skip-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 10px 20px;
    border-radius: 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.15s;
  }

  .timer-skip-btn:hover { border-color: var(--accent); color: var(--accent); }

  .timer-add-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 20px;
    border-radius: 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.15s;
  }

  .timer-add-btn:hover { border-color: var(--accent2); color: var(--accent2); }
</style>
</head>
<body>

<header>
  <h1>Plan Espalda</h1>
  <p>Seguimiento de entrenamiento · 3 días/semana</p>
</header>

<div class="week-selector">
  <button onclick="changeWeek(-1)">‹</button>
  <span id="week-label">SEMANA 1</span>
  <button onclick="changeWeek(1)">›</button>
</div>

<div class="days-grid" id="days-grid"></div>

<div class="session-panel">
  <div class="session-header">
    <h2 id="session-title">LUNES</h2>
    <button class="finish-btn" onclick="finishSession()">✓ Terminar sesión</button>
  </div>
  <div class="exercise-list" id="exercise-list"></div>
  <div class="progress-bar-wrap">
    <div class="progress-label">
      <span>Progreso sesión</span>
      <span id="progress-text">0 / 21 series</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  </div>
</div>

<div class="stats-section">
  <div class="stats-title">📊 Mis estadísticas</div>
  <div class="stats-grid">
    <div class="stat-box">
      <div class="stat-num" id="stat-sessions">0</div>
      <div class="stat-desc">Sesiones</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="stat-sets">0</div>
      <div class="stat-desc">Series totales</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="stat-weeks">0</div>
      <div class="stat-desc">Semanas</div>
    </div>
  </div>
</div>

<button class="reset-btn" onclick="resetAll()">🗑 Reiniciar todo el progreso</button>
<!-- STRETCHING POPUP -->
<div class="stretch-overlay" id="stretch-overlay">
  <div class="stretch-inner">
    <div class="stretch-header">
      <h2>🧘 Estiramientos</h2>
      <p>Vuelta a la calma · 6 ejercicios · ~8 min</p>
    </div>
    <div class="stretch-progress-row">
      <span id="stretch-done-label">0 de 6 completados</span>
      <span id="stretch-pct">0%</span>
    </div>
    <div class="stretch-progress-bar">

<script>
// ── IOS AUDIO UNLOCK ───────────────────────────────────
let audioCtx = null;

function getAudioContext() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
  return audioCtx;
}

document.addEventListener('touchstart', function unlockAudio() {
  const ctx = getAudioContext();
  const buf = ctx.createBuffer(1, 1, 22050);
  const src = ctx.createBufferSource();
  src.buffer = buf;
  src.connect(ctx.destination);
  src.start(0);
  document.removeEventListener('touchstart', unlockAudio);
}, { once: true });
const TIMER_DURATION = 60;
const CIRCUMFERENCE = 2 * Math.PI * 82; // 515.2
let timerInterval = null;
let timerRemaining = 0;
let timerTotal = TIMER_DURATION;

function playBeep(long = false) {
  try {
    const ctx = getAudioContext();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(long ? 880 : 1200, ctx.currentTime);
    gain.gain.setValueAtTime(0, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0.4, ctx.currentTime + 0.01);
    const duration = long ? 0.8 : 0.12;
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + duration);
  } catch(e) {}
}

function playWhistle() {
  try {
    const ctx = getAudioContext();
    const times = [0, 0.22, 0.44];
    times.forEach(offset => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(2800, ctx.currentTime + offset);
      osc.frequency.exponentialRampToValueAtTime(2200, ctx.currentTime + offset + 0.18);
      gain.gain.setValueAtTime(0, ctx.currentTime + offset);
      gain.gain.linearRampToValueAtTime(0.5, ctx.currentTime + offset + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + offset + 0.18);
      osc.start(ctx.currentTime + offset);
      osc.stop(ctx.currentTime + offset + 0.2);
    });
  } catch(e) {}
}

function startTimer(exerciseName) {
  if (timerInterval) clearInterval(timerInterval);
  timerRemaining = TIMER_DURATION;
  timerTotal = TIMER_DURATION;
  document.getElementById('timer-exercise-name').textContent = '↻ Siguiente: ' + exerciseName;
  updateTimerDisplay();
  document.getElementById('timer-overlay').classList.add('active');

  timerInterval = setInterval(() => {
    timerRemaining--;
    updateTimerDisplay();
    if (timerRemaining > 0 && timerRemaining <= 5) {
      playBeep(false);
    }
    if (timerRemaining <= 0) {
      clearInterval(timerInterval);
      timerInterval = null;
      playBeep(true);
      setTimeout(() => playWhistle(), 900);
      setTimeout(() => document.getElementById('timer-overlay').classList.remove('active'), 1800);
    }
  }, 1000);
}

function updateTimerDisplay() {
  const el = document.getElementById('timer-number');
  const arc = document.getElementById('timer-arc');
  el.textContent = timerRemaining;
  el.className = 'timer-number' + (timerRemaining <= 10 ? ' urgent' : '');
  const progress = timerRemaining / timerTotal;
  arc.style.strokeDashoffset = CIRCUMFERENCE * (1 - progress);
  arc.style.stroke = timerRemaining <= 10 ? '#ff4747' : 'var(--accent2)';
}

function skipTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  document.getElementById('timer-overlay').classList.remove('active');
}

function addTime(secs) {
  timerRemaining = Math.min(timerRemaining + secs, 180);
  timerTotal = Math.max(timerTotal, timerRemaining);
  updateTimerDisplay();
}

  week: 1,
  activeDay: 0,
  sets: {},
  completedSessions: [],
  totalSets: 0
};

function save() { localStorage.setItem('espalda_state', JSON.stringify(state)); }

function key(week, day, ex, set) { return `${week}_${day}_${ex}_${set}`; }

function changeWeek(d) {
  state.week = Math.max(1, Math.min(12, state.week + d));
  save();
  render();
}

function selectDay(d) {
  state.activeDay = d;
  save();
  render();
}

function toggleSet(ex, set) {
  const k = key(state.week, state.activeDay, ex, set);
  state.sets[k] = !state.sets[k];
  if (state.sets[k]) {
    state.totalSets++;
    // Start rest timer — show next exercise or "última serie"
    const nextEx = EXERCISES[ex + 1] ? EXERCISES[ex + 1].name : (set + 1 < EXERCISES[ex].sets ? EXERCISES[ex].name : '¡Fin del entrenamiento!');
    startTimer(nextEx);
  } else {
    state.totalSets = Math.max(0, state.totalSets - 1);
    skipTimer();
  }
  save();
  renderExercises();
  renderProgress();
  renderStats();
}

function finishSession() {
  const sk = `${state.week}_${state.activeDay}`;
  if (!state.completedSessions.includes(sk)) {
    state.completedSessions.push(sk);
    save();
  }
  skipTimer();
  openStretch();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function resetAll() {
  if (confirm("¿Seguro que quieres borrar todo el progreso?")) {
    state = { week: 1, activeDay: 0, sets: {}, completedSessions: [], totalSets: 0 };
    save();
    render();
  }
}

    const done = state.completedSessions.includes(sk);
    const active = state.activeDay === i;
    return `<button class="day-btn ${active ? 'active' : ''} ${done ? 'completed' : ''}" onclick="selectDay(${i})">
      ${d}
      <span class="check">${done ? '✓ Listo' : active ? '▶ Activo' : ''}</span>
    </button>`;
  }).join('');
}

function renderExercises() {
  const list = document.getElementById('exercise-list');
  document.getElementById('session-title').textContent = DAYS[state.activeDay];
  list.innerHTML = EXERCISES.map((ex, ei) => {
    const sets = Array.from({length: ex.sets}, (_, si) => {
      const done = !!state.sets[key(state.week, state.activeDay, ei, si)];
      return `<div class="set-item ${done ? 'done' : ''}" onclick="toggleSet(${ei},${si})">
        <div class="set-label">Serie ${si + 1}</div>
        <div class="set-reps">${ex.reps}</div>
        <div class="set-done-icon">✓</div>
      </div>`;
    }).join('');
    return `<div class="exercise-card">
      <div class="exercise-top-row">
        <div class="exercise-name">${ex.name} <span class="muscle-tag">${ex.muscle}</span></div>
        <button class="info-btn" onclick="openGuide(${ei})">?</button>
      </div>
      <div class="sets-row">${sets}</div>
    </div>`;
  }).join('');
}

function renderProgress() {
  let done = 0;
  EXERCISES.forEach((ex, ei) => {
    for (let si = 0; si < ex.sets; si++) {
      if (state.sets[key(state.week, state.activeDay, ei, si)]) done++;
    }
  });
  document.getElementById('progress-text').textContent = `${done} / ${TOTAL_SETS} series`;
  document.getElementById('progress-fill').style.width = `${(done / TOTAL_SETS) * 100}%`;
}

function renderStats() {
  document.getElementById('stat-sessions').textContent = state.completedSessions.length;
  document.getElementById('stat-sets').textContent = state.totalSets;
  const weeks = new Set(state.completedSessions.map(s => s.split('_')[0])).size;
  document.getElementById('stat-weeks').textContent = weeks;
}

function render() {
  document.getElementById('week-label').textContent = `SEMANA ${state.week}`;
  renderDays();
  renderExercises();
  renderProgress();
  renderStats();
}

render();
</script>
</body>
</html>
